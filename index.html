<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Metro Rush - Subway Edition</title>
    <style>
        :root {
            --bg-color: #0c0f1d;
            --card-bg: rgba(255, 255, 255, 0.12);
            --card-blur: blur(25px);
            --accent-color: #FF9500; /* Orange Subway */
            --accent-gradient: linear-gradient(135deg, #FF9500, #FF5E00);
            --text-color: #FFFFFF;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: var(--font-family);
            color: var(--text-color);
        }

        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1e223a 0%, #0c0f1d 100%);
        }

        canvas {
            display: block;
            box-shadow: 0 25px 60px rgba(0,0,0,0.7);
            border-radius: 4px;
        }

        /* --- UI INTERFACE --- */
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 24px;
        }

        .hud {
            display: flex;
            justify-content: space-between;
            width: 100%;
            pointer-events: auto;
        }

        .hud-card {
            background: var(--card-bg);
            backdrop-filter: var(--card-blur);
            -webkit-backdrop-filter: var(--card-blur);
            padding: 14px 24px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: 800;
            font-size: 1.2rem;
            letter-spacing: -0.5px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            text-transform: uppercase;
        }

        .hud-card span {
            color: #FFD60A;
        }

        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(12, 15, 29, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }

        .screen.active {
            opacity: 1;
            visibility: visible;
        }

        .panel {
            background: rgba(30, 33, 58, 0.75);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 32px;
            padding: 40px;
            text-align: center;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 30px 60px rgba(0,0,0,0.6);
            transform: scale(0.85);
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .screen.active .panel {
            transform: scale(1);
        }

        h1 {
            font-size: 3rem;
            font-weight: 900;
            letter-spacing: -1.5px;
            margin-bottom: 6px;
            background: linear-gradient(180deg, #FF9500 0%, #FFCC00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-transform: uppercase;
        }

        p {
            color: #AEAEB2;
            font-size: 1rem;
            margin-bottom: 24px;
        }

        .stats-container {
            background: rgba(255, 255, 255, 0.06);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 32px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            font-size: 1.2rem;
            font-weight: 600;
        }
        .stat-row:not(:last-child) {
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .btn {
            background: var(--accent-gradient);
            color: white;
            border: none;
            padding: 18px 32px;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 20px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 25px rgba(255, 149, 0, 0.35);
            pointer-events: auto;
            text-transform: uppercase;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 30px rgba(255, 149, 0, 0.5);
        }

        .btn:active {
            transform: translateY(1px);
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>

        <div class="ui-layer">
            <div class="hud">
                <div class="hud-card" id="hud-score">SCORE: 0</div>
                <div class="hud-card" id="hud-coins">COINS: <span>0</span></div>
            </div>
        </div>

        <div class="screen active" id="start-screen">
            <div class="panel">
                <h1>Metro Rush</h1>
                <p>Édition Spéciale pour Maxence Dardenne</p>
                <div class="stats-container" style="text-align: left; font-size: 0.95rem; color: #E5E5EA; line-height: 1.5;">
                    <div style="margin-bottom: 10px; font-weight: 800; color: #FF9500; text-transform: uppercase;">Commandes :</div>
                    • <strong>PC :</strong> Flèches ou Z, Q, S, D<br>
                    • <strong>Mobile / Tablette :</strong> Glisser (Swipe) vers le Haut / Bas / Gauche / Droite
                </div>
                <button class="btn" id="start-btn">Jouer</button>
            </div>
        </div>

        <div class="screen" id="gameover-screen">
            <div class="panel">
                <h1>Game Over</h1>
                <p>Le garde vous a attrapé !</p>
                <div class="stats-container">
                    <div class="stat-row">
                        <span>Score :</span>
                        <span id="final-score" style="color: var(--accent-color);">0</span>
                    </div>
                    <div class="stat-row">
                        <span>Pièces :</span>
                        <span id="final-coins" style="color: #FFD60A;">0</span>
                    </div>
                </div>
                <button class="btn" id="restart-btn">Recommencer</button>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Éléments d'interface
        const startScreen = document.getElementById('start-screen');
        const gameoverScreen = document.getElementById('gameover-screen');
        const startBtn = document.getElementById('start-btn');
        const restartBtn = document.getElementById('restart-btn');
        const hudScore = document.getElementById('hud-score');
        const hudCoins = document.getElementById('hud-coins').querySelector('span');
        const finalScore = document.getElementById('final-score');
        const finalCoins = document.getElementById('final-coins');

        // --- PARAMÈTRES ET CONFIGURATION DE LA PERSPECTIVE 3D ---
        const CONFIG = {
            baseSpeed: 0.15,         // Vitesse initiale sur l'axe Z (profondeur)
            maxSpeed: 0.45,         // Vitesse maximale
            acceleration: 0.00005,  // Accélération par frame
            gravity: 0.5,           // Force de gravité
            lanes: [-1, 0, 1],      // Gauche, Milieu, Droite
            laneSpacing: 160,       // Écartement réel des voies au premier plan
            horizonY: 0.35,         // Position de la ligne d'horizon (35% du haut de l'écran)
            cameraDepth: 0.9,       // Facteur d'ajustement de la perspective
        };

        // --- ÉTAT DU JEU ---
        let game = {
            running: false,
            speed: CONFIG.baseSpeed,
            distance: 0,
            score: 0,
            coins: 0,
            obstacles: [],
            coinsArray: [],
            particles: [],
            lastSpawnTime: 0,
            spawnInterval: 800
        };

        // Fonction mathématique essentielle : Projette un point 3D (X, Y, Z) sur notre écran 2D
        function project3D(x3d, y3d, z3d) {
            // z3d représente la distance par rapport au joueur (de 0 à l'infini)
            if (z3d <= 0) z3d = 0.01; 
            
            // Calcul du facteur d'échelle basé sur la profondeur (Perspective linéaire)
            const scale = CONFIG.cameraDepth / z3d;
            
            const horizonPixels = canvas.height * CONFIG.horizonY;
            
            return {
                x: (canvas.width / 2) + (x3d * scale),
                y: horizonPixels + ((canvas.height - horizonPixels) * scale) - (y3d * scale),
                scale: scale
            };
        }

        // --- CLASSE DU JOUEUR ---
        class Player {
            constructor() {
                this.lane = 0;
                this.targetX3D = 0;
                this.x3d = 0; // Position 3D
                this.y3d = 0; // Hauteur de saut
                this.z3d = 1.2; // Placé juste devant la caméra (premier plan constant)
                
                this.vy = 0;
                this.isJumping = false;
                this.isSliding = false;
                this.slideTimer = 0;
                this.slideDuration = 30;
                
                this.width3D = 45;
                this.height3D = 85;
            }

            update() {
                // Déplacement latéral fluide
                this.targetX3D = this.lane * CONFIG.laneSpacing;
                this.x3d += (this.targetX3D - this.x3d) * 0.25;

                // Gestion physique du saut
                if (this.isJumping) {
                    this.vy -= CONFIG.gravity;
                    this.y3d += this.vy;
                    if (this.y3d <= 0) {
                        this.y3d = 0;
                        this.vy = 0;
                        this.isJumping = false;
                    }
                }

                // Gestion physique de la glissade
                if (this.isSliding) {
                    this.slideTimer--;
                    if (this.slideTimer <= 0) {
                        this.isSliding = false;
                    }
                }
            }

            draw() {
                // Projection 3D du joueur vers l'écran
                const p = project3D(this.x3d, this.y3d, this.z3d);
                
                const w = this.width3D * p.scale;
                let h = this.height3D * p.scale;
                if (this.isSliding) h *= 0.5; // Hitbox visuelle réduite lors d'un slide

                ctx.save();

                // Ombre au sol
                ctx.fillStyle = 'rgba(0, 0, 0, 0.4)';
                ctx.beginPath();
                ctx.ellipse(p.x, project3D(this.x3d, 0, this.z3d).y, w * 0.6, h * 0.1, 0, 0, Math.PI * 2);
                ctx.fill();

                // Corps (Design dynamique "Streetwear" inspiré du style de Jake dans Subway Surfers)
                ctx.fillStyle = '#FF5E00'; // Veste orange fluo
                ctx.beginPath();
                ctx.roundRect(p.x - w / 2, p.y - h, w, h, [12 * p.scale, 12 * p.scale, 4 * p.scale, 4 * p.scale]);
                ctx.fill();

                // Casquette / Tête
                ctx.fillStyle = '#007AFF'; // Casquette bleue branchée
                ctx.beginPath();
                ctx.roundRect(p.x - w / 2.5, p.y - h, (w / 2.5) * 2, h * 0.25, [8 * p.scale, 8 * p.scale, 2 * p.scale, 2 * p.scale]);
                ctx.fill();

                // Visière de la casquette
                ctx.fillStyle = '#1C1C1E';
                ctx.fillRect(p.x - w / 4, p.y - h + (h * 0.08), w * 0.7, h * 0.05);

                ctx.restore();
            }

            moveLeft() { if (this.lane > -1) this.lane--; }
            moveRight() { if (this.lane < 1) this.lane++; }
            jump() {
                if (!this.isJumping && !this.isSliding) {
                    this.isJumping = true;
                    this.vy = 12;
                }
            }
            slide() {
                if (!this.isJumping && !this.isSliding) {
                    this.isSliding = true;
                    this.slideTimer = this.slideDuration;
                }
            }
        }

        let player = new Player();

        // --- CLASSE DES OBSTACLES SUBWAY ---
        class Obstacle {
            constructor() {
                this.lane = CONFIG.lanes[Math.floor(Math.random() * CONFIG.lanes.length)];
                this.x3d = this.lane * CONFIG.laneSpacing;
                this.y3d = 0;
                this.z3d = 20; // Apparaît très loin à l'horizon
                
                const types = ['barrier', 'train', 'lightpole'];
                this.type = types[Math.floor(Math.random() * types.length)];
                
                // Dimensions de base dans l'espace virtuel 3D
                this.width3D = 60;
                this.height3D = 50;

                if (this.type === 'train') {
                    this.height3D = 140;
                    this.width3D = 90;
                } else if (this.type === 'lightpole') {
                    this.height3D = 160;
                    this.width3D = 20;
                    this.laneOffset = (Math.random() > 0.5 ? 40 : -40); // Décale le poteau sur le bord de la voie
                    this.x3d += this.laneOffset;
                }
            }

            update() {
                this.z3d -= game.speed; // Avance vers la caméra (le joueur)
            }

            draw() {
                if (this.z3d < CONFIG.cameraDepth) return; // Ne pas dessiner si dépassé en arrière plan

                const p = project3D(this.x3d, this.y3d, this.z3d);
                const w = this.width3D * p.scale;
                const h = this.height3D * p.scale;

                ctx.save();

                if (this.type === 'barrier') {
                    // Barrière de chantier Subway (Rouge et blanche)
                    ctx.fillStyle = '#FF3B30';
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);
                    
                    ctx.fillStyle = '#FFFFFF';
                    ctx.fillRect(p.x - w/2, p.y - h + (h*0.25), w, h*0.25);
                    ctx.fillRect(p.x - w/2, p.y - h + (h*0.65), w, h*0.15);

                    // Pieds
                    ctx.fillStyle = '#1C1C1E';
                    ctx.fillRect(p.x - w/2, p.y - (h*0.1), w*0.1, h*0.1);
                    ctx.fillRect(p.x + w/2 - (w*0.1), p.y - (h*0.1), w*0.1, h*0.1);
                } 
                else if (this.type === 'train') {
                    // Wagon de Métro complet en perspective
                    ctx.fillStyle = '#007AFF'; // Couleur de rame bleue intense
                    ctx.beginPath();
                    ctx.roundRect(p.x - w/2, p.y - h, w, h, [15 * p.scale, 15 * p.scale, 0, 0]);
                    ctx.fill();

                    // Bandes jaunes sur le train
                    ctx.fillStyle = '#FFCC00';
                    ctx.fillRect(p.x - w/2, p.y - h + (h * 0.7), w, h * 0.08);

                    // Pare-brise avant noir
                    ctx.fillStyle = '#1C1C1E';
                    ctx.beginPath();
                    ctx.roundRect(p.x - w/2.5, p.y - h + (h*0.1), (w/2.5)*2, h*0.3, 4);
                    ctx.fill();

                    // Phares lumineux du train
                    ctx.fillStyle = '#FFD60A';
                    ctx.shadowBlur = 20 * p.scale;
                    ctx.shadowColor = '#FFD60A';
                    ctx.beginPath();
                    ctx.arc(p.x - w/3, p.y - h + (h * 0.55), 6 * p.scale, 0, Math.PI * 2);
                    ctx.arc(p.x + w/3, p.y - h + (h * 0.55), 6 * p.scale, 0, Math.PI * 2);
                    ctx.fill();
                }
                else if (this.type === 'lightpole') {
                    // Poteau de signalisation ferroviaire complexe
                    ctx.fillStyle = '#3A3A3C';
                    ctx.fillRect(p.x - w/2, p.y - h, w, h);

                    // Feu de signalisation au sommet
                    ctx.fillStyle = '#1C1C1E';
                    ctx.fillRect(p.x - w, p.y - h, w*2, h*0.25);

                    ctx.fillStyle = '#FF3B30'; // Alerte rouge fixe
                    ctx.beginPath();
                    ctx.arc(p.x, p.y - h + (h*0.125), 5 * p.scale, 0, Math.PI * 2);
                    ctx.fill();
                }

                ctx.restore();
            }
        }

        // --- CLASSE DES PIÈCES DE MONNAIE MAGIQUES (COINS) ---
        class Coin {
            constructor(lane, zOffset = 0) {
                this.lane = lane;
                this.x3d = this.lane * CONFIG.laneSpacing;
                this.y3d = 30; // Légèrement surélevées pour inciter à sauter
                this.z3d = 20 + zOffset; 
                this.size3D = 18;
                this.angle = Math.random() * Math.PI;
            }

            update() {
                this.z3d -= game.speed;
                this.angle += 0.06;
            }

            draw() {
                if (this.z3d < CONFIG.cameraDepth) return;

                const p = project3D(this.x3d, this.y3d, this.z3d);
                const size = this.size3D * p.scale;

                ctx.save();
                ctx.translate(p.x, p.y);
                ctx.scale(Math.sin(this.angle), 1); // Effet rotation tridimensionnelle

                ctx.fillStyle = '#FFD60A';
                ctx.shadowBlur = 15 * p.scale;
                ctx.shadowColor = '#FFD60A';
                ctx.beginPath();
                ctx.arc(0, 0, size, 0, Math.PI * 2);
                ctx.fill();

                // Relief intérieur de la pièce Subway
                ctx.strokeStyle = '#FF9500';
                ctx.lineWidth = 2 * p.scale;
                ctx.beginPath();
                ctx.arc(0, 0, size * 0.6, 0, Math.PI * 2);
                ctx.stroke();

                ctx.restore();
            }
        }

        // --- PARTICULES D'IMPACT ---
        class Particle {
            constructor(x, y, color) {
                this.x = x; this.y = y; this.color = color;
                this.vx = (Math.random() - 0.5) * 10;
                this.vy = (Math.random() - 0.5) * 10;
                this.alpha = 1;
                this.size = Math.random() * 5 + 3;
            }
            update() { this.x += this.vx; this.y += this.vy; this.alpha -= 0.04; }
            draw() {
                ctx.save(); ctx.globalAlpha = this.alpha; ctx.fillStyle = this.color;
                ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2); ctx.fill();
                ctx.restore();
            }
        }

        function spawnParticles(x, y, color) {
            for (let i = 0; i < 15; i++) game.particles.push(new Particle(x, y, color));
        }

        // --- CONTRÔLES COMPLETS (RESPONSIVE PC & SWIPE MOBILE) ---
        function resizeCanvas() {
            canvas.width = Math.min(window.innerWidth, 480); // Format vertical smartphone strict type Subway
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        window.addEventListener('keydown', (e) => {
            if (!game.running) return;
            if (e.key === 'ArrowLeft' || e.key === 'q' || e.key === 'Q') player.moveLeft();
            if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') player.moveRight();
            if (e.key === 'ArrowUp' || e.key === 'z' || e.key === 'Z') player.jump();
            if (e.key === 'ArrowDown' || e.key === 's' || e.key === 'S') player.slide();
        });

        let touchStartX = 0, touchStartY = 0;
        window.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX; touchStartY = e.touches[0].clientY;
        }, { passive: true });

        window.addEventListener('touchend', (e) => {
            if (!game.running) return;
            let diffX = e.changedTouches[0].clientX - touchStartX;
            let diffY = e.changedTouches[0].clientY - touchStartY;
            if (Math.abs(diffX) > Math.abs(diffY)) {
                if (diffX > 35) player.moveRight(); else if (diffX < -35) player.moveLeft();
            } else {
                if (diffY > 35) player.slide(); else if (diffY < -35) player.jump();
            }
        }, { passive: true });

        // --- INFRASTRUCTURE ET RENDU DE L'ENVIRONNEMENT 3D ---
        function drawEnvironment() {
            const horizonY = canvas.height * CONFIG.horizonY;

            // Ciel de fin de journée dégradé néon
            let skyGrad = ctx.createLinearGradient(0, 0, 0, horizonY);
            skyGrad.addColorStop(0, '#05070f');
            skyGrad.addColorStop(1, '#191330');
            ctx.fillStyle = skyGrad;
            ctx.fillRect(0, 0, canvas.width, horizonY);

            // Sol de la zone ferroviaire
            ctx.fillStyle = '#0f111a';
            ctx.fillRect(0, horizonY, canvas.width, canvas.height - horizonY);

            // Tracé géométrique 3D des rails convergents vers l'horizon
            CONFIG.lanes.forEach(lane => {
                const farLeft = project3D((lane * CONFIG.laneSpacing) - 35, 0, 20);
                const farRight = project3D((lane * CONFIG.laneSpacing) + 35, 0, 20);
                const nearLeft = project3D((lane * CONFIG.laneSpacing) - 45, 0, CONFIG.cameraDepth);
                const nearRight = project3D((lane * CONFIG.laneSpacing) + 45, 0, CONFIG.cameraDepth);

                // Couleur du ballast (lit de pierres sous les rails)
                ctx.fillStyle = 'rgba(255, 255, 255, 0.015)';
                ctx.beginPath();
                ctx.moveTo(farLeft.x, farLeft.y); ctx.lineTo(farRight.x, farRight.y);
                ctx.lineTo(nearRight.x, nearRight.y); ctx.lineTo(nearLeft.x, nearLeft.y);
                ctx.closePath();
                ctx.fill();

                // Ligne de rail gauche
                ctx.strokeStyle = '#4e556e';
                ctx.lineWidth = 3;
                ctx.beginPath(); ctx.moveTo(farLeft.x, farLeft.y); ctx.lineTo(nearLeft.x, nearLeft.y); ctx.stroke();

                // Ligne de rail droite
                ctx.beginPath(); ctx.moveTo(farRight.x, farRight.y); ctx.lineTo(nearRight.x, nearRight.y); ctx.stroke();

                // Traverses en bois au sol espacées (Simulation du mouvement 3D linéaire)
                ctx.strokeStyle = 'rgba(255, 149, 0, 0.1)';
                ctx.lineWidth = 4;
                for (let z = 1; z < 20; z += 1.5) {
                    let dynamicZ = z - (game.distance % 1.5);
                    if (dynamicZ < CONFIG.cameraDepth) continue;
                    
                    let tLeft = project3D((lane * CONFIG.laneSpacing) - 40, 0, dynamicZ);
                    let tRight = project3D((lane * CONFIG.laneSpacing) + 40, 0, dynamicZ);
                    
                    ctx.beginPath();
                    ctx.moveTo(tLeft.x, tLeft.y);
                    ctx.lineTo(tRight.x, tRight.y);
                    ctx.stroke();
                }
            });
        }

        // --- GÉNÉRATEUR SPATIAL PROCÉDURAL ---
        function generateWorld(timestamp) {
            if (timestamp - game.lastSpawnTime > game.spawnInterval) {
                if (Math.random() > 0.45) {
                    game.obstacles.push(new Obstacle());
                } else {
                    let lane = CONFIG.lanes[Math.floor(Math.random() * CONFIG.lanes.length)];
                    for (let i = 0; i < 4; i++) {
                        game.coinsArray.push(new Coin(lane, i * 1.8)); // Espacement progressif sur l'axe Z
                    }
                }
                game.lastSpawnTime = timestamp;
                game.spawnInterval = Math.max(450, 950 - (game.speed * 1200));
            }
        }

        // --- MODULE DE COLLISION AXIAL TRIDIMENSIONNEL (FIABLE) ---
        function checkCollisions() {
            // 1. Détection des Pièces (Coins)
            for (let i = game.coinsArray.length - 1; i >= 0; i--) {
                let c = game.coinsArray[i];
                
                // Test de proximité absolue sur la profondeur (axe Z) et la voie
                if (Math.abs(c.z3d - player.z3d) < 0.25 && c.lane === player.lane) {
                    // Test de hauteur (Saut suffisant ou non)
                    if (player.y3d + player.height3D >= c.y3d - c.size3D) {
                        game.coins++;
                        game.score += 60;
                        hudCoins.innerText = game.coins;

                        const p = project3D(c.x3d, c.y3d, c.z3d);
                        spawnParticles(p.x, p.y, '#FFD60A');
                        game.coinsArray.splice(i, 1);
                    }
                }
            }

            // 2. Détection des Obstacles
            for (let o of game.obstacles) {
                // Vérification si l'obstacle est au même niveau de profondeur Z que la boite de collision du joueur
                if (Math.abs(o.z3d - player.z3d) < 0.22 && o.lane === player.lane) {
                    
                    if (o.type === 'barrier' && player.isSliding) {
                        continue; // Passe en-dessous de la barrière haute
                    }
                    if (o.type === 'lightpole') {
                        continue; // Le poteau est sur le côté, pas d'impact frontal
                    }
                    if (o.type === 'barrier' && player.isJumping && player.y3d > o.height3D * 0.7) {
                        continue; // Saute par dessus la barrière basse
                    }

                    // Collision fatale détectée
                    gameOver();
                    break;
                }
            }
        }

        // --- GAMELOOP PRINCIPALE ---
        function gameLoop(timestamp) {
            if (!game.running) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (game.speed < CONFIG.maxSpeed) {
                game.speed += CONFIG.acceleration;
            }

            game.distance += game.speed;
            game.score += Math.floor(game.speed * 15);
            hudScore.innerText = `SCORE: ${game.score}`;

            generateWorld(timestamp);
            drawEnvironment();

            // Tri pour afficher d'abord les objets les plus lointains (Z important)
            // Évite les erreurs de superposition graphique (Painter's algorithm)
            game.obstacles.sort((a, b) => b.z3d - a.z3d);
            game.coinsArray.sort((a, b) => b.z3d - a.z3d);

            for (let i = game.obstacles.length - 1; i >= 0; i--) {
                let o = game.obstacles[i];
                o.update();
                o.draw();
                if (o.z3d < CONFIG.cameraDepth) game.obstacles.splice(i, 1);
            }

            for (let i = game.coinsArray.length - 1; i >= 0; i--) {
                let c = game.coinsArray[i];
                c.update();
                c.draw();
                if (c.z3d < CONFIG.cameraDepth) game.coinsArray.splice(i, 1);
            }

            for (let i = game.particles.length - 1; i >= 0; i--) {
                let p = game.particles[i]; p.update(); p.draw();
                if (p.alpha <= 0) game.particles.splice(i, 1);
            }

            player.update();
            player.draw();

            checkCollisions();

            requestAnimationFrame(gameLoop);
        }

        // --- SYSTEM ACTIONS ---
        function resetGame() {
            game.speed = CONFIG.baseSpeed; game.distance = 0; game.score = 0; game.coins = 0;
            game.obstacles = []; game.coinsArray = []; game.particles = [];
            game.lastSpawnTime = performance.now(); game.spawnInterval = 800;
            player = new Player();
            hudScore.innerText = "SCORE: 0"; hudCoins.innerText = "0";
        }

        function startGame() {
            resetGame();
            startScreen.classList.remove('active'); gameoverScreen.classList.remove('active');
            game.running = true;
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            game.running = false;
            finalScore.innerText = game.score; finalCoins.innerText = game.coins;
            gameoverScreen.classList.add('active');
        }

        startBtn.addEventListener('click', startGame);
        restartBtn.addEventListener('click', startGame);
    </script>
</body>
</html>
